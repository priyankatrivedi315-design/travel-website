<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Travel Website</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    /* Hero Section */
    .hero {
      background-image: url('img/Mountain.jpg'); /* replace with your uploaded image path */
      background-size: 1200px;
      background-position: center;
      height: 100vh;
      color: rgb(213, 200, 227);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .hero h1 {
      font-size: 50px;
      background: rgba(0,0,0,0.5);
      padding: 10px 20px;
      border-radius: 10px;
    }

    .hero p {
      font-size: 20px;
    }

    /* Navigation */
    nav {
      position: fixed;
      top: 0;
      width: 100%;
      background: rgba(0,0,0,0.7);
      padding: 10px;
      text-align: center;
      z-index: 1000;
    }

    nav a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
    }

    nav a:hover {
      color: yellow;
    }

    /* Countries Section */
    .countries {
      padding: 50px;
      text-align: center;
      background: #f4f4f4;
    }

    .country-card {
      display: inline-block;
      width: 250px;
      margin: 15px;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      transition: transform 0.3s;
      background: white;
    }

    .country-card:hover {
      transform: scale(1.05);
    }

    .country-card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
    }

    .country-card h3 {
      margin: 10px 0;
    }

    .country-card a {
      display: block;
      padding: 10px;
      background: #007BFF;
      color: white;
      text-decoration: none;
    }

    .country-card a:hover {
      background: #0056b3;
    }

    /* Country Pages */
    .country-page {
      padding: 100px 20px;
      text-align: center;
    }

    footer {
      background: #333;
      color: white;
      text-align: center;
      padding: 20px;
    }
  </style>
</head>
<body>

<nav>
  <a href="#home">Home</a>
  <a href="#countries">Countries</a>
</nav>

<div class="hero" id="home">
  <h1>Enjoy Your Trip</h1>
  <p>Explore the world with us</p>
</div>

<section class="countries" id="countries">
  <h2>Top 7 Countries</h2>

  <div class="country-card">
    <img src="img/fra.jpg" alt="France">
    <h3>France</h3>
    <a href="France.html">Visit</a>
  </div>

  <div class="country-card">
    <img src="img/jj.jpg" alt="Japan">
    <h3>Japan</h3>
    <a href="japan.html">Visit</a>
  </div>

  <div class="country-card">
    <img src="img/us.jpg" alt="USA">
    <h3>USA</h3>
    <a href="usa.html">Visit</a>
  </div>

  <div class="country-card">
    <img src="img/ita.jpg" alt="Italy">
    <h3>Italy</h3>
    <a href="italy.html">Visit</a>
  </div>

  <div class="country-card">
    <img src="img/ind.jpg" alt="India">
    <h3>India</h3>
    <a href="india.html">Visit</a>
  </div>

  <div class="country-card">
    <img src="img/au.jpg" alt="Australia">
    <h3>Australia</h3>
    <a href="australia.html">Visit</a>
  </div>

  <div class="country-card">
    <img src="img/br.jpg" alt="Brazil">
    <h3>Brazil</h3>
    <a href="brazil.html">Visit</a>
  </div>

</section>

<footer>
  <p>© 2026 Travel Website</p>
</footer>

</body>
</html>
